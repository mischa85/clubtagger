<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubtagger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 12px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 15px; color: #00d4ff; font-size: 1.5em; }

        /* Responsive layout: widescreen = decks left + sidebar right */
        @media (min-width: 1100px) {
            .container { display: grid; grid-template-columns: 1fr 320px; grid-template-rows: auto 1fr; gap: 12px; }
            .container > h1 { grid-column: 1 / -1; }
            .main-content { display: contents; }
            .decks-container { grid-column: 1; grid-row: 2; }
            .sidebar { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; gap: 12px; }
        }
        @media (max-width: 1099px) {
            .sidebar { /* stacked below decks on narrow screens */ }
        }
        
        /* Audio section - compact VU + REC status */
        .audio-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 10px;
        }
        
        /* VU Meter */
        .vu-container {
            display: flex;
            gap: 8px;
        }
        .vu-channel {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 3px;
        }
        .vu-label { font-size: 10px; color: #666; }
        .vu-bar-container {
            width: 24px;
            height: 120px;
            background: #222;
            border-radius: 4px;
            position: relative;
            overflow: hidden;
        }
        .vu-bar-bg {
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(to top, #00ff00 0%, #00ff00 60%, #ffff00 75%, #ff8800 85%, #ff0000 95%);
            border-radius: 4px;
        }
        .vu-bar-mask {
            position: absolute;
            top: 0;
            width: 100%;
            background: #222;
            transition: height 50ms ease-out;
        }
        .vu-peak {
            position: absolute;
            width: 100%;
            height: 2px;
            background: #fff;
            transition: bottom 50ms ease-out;
        }
        
        /* Recording status */
        .rec-status {
            font-size: 14px;
            font-weight: bold;
            padding: 8px 16px;
            border-radius: 6px;
            background: #222;
        }
        .rec-status.recording {
            background: #4d1a1a;
            color: #f44336;
            animation: blink 1s infinite;
        }
        .rec-status.standby {
            color: #666;
        }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* Nerd Stats Panel (collapsible) */
        .nerd-stats {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 11px;
        }
        .nerd-stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #666;
            margin-bottom: 8px;
        }
        .nerd-stats-header:hover { color: #888; }
        .nerd-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .nerd-stat {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .nerd-stat .label { color: #666; }
        .nerd-stat .value { color: #00d4ff; }
        .nerd-stat .value.warn { color: #ff9800; }
        .nerd-stat .value.ok { color: #4caf50; }
        
        /* Recording panel */
        .rec-panel {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 11px;
        }
        .rec-panel .rec-indicator {
            font-size: 14px;
            font-weight: bold;
            padding: 4px 10px;
            border-radius: 4px;
            background: #222;
        }
        .rec-panel .rec-indicator.recording {
            background: #4d1a1a;
            color: #f44336;
            animation: blink 1s infinite;
        }
        .rec-panel .rec-indicator.standby { color: #666; }
        .rec-panel .rec-detail { color: #666; }
        .rec-panel .rec-detail span { color: #aaa; }

        /* ═══════════ CDJ-2000 Style Deck Cards ═══════════ */
        .decks-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
        }
        @media (max-width: 480px) { .decks-container { grid-template-columns: 1fr; } }

        .deck.cdj-style {
            background: #0a0a12;
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            padding: 8px;
            overflow: hidden;
            min-width: 0; /* prevent flex/grid blowout */
        }
        .deck.cdj-style.on-air { border-color: #3a1a1a; }

        /* Title bar */
        .cdj-title { display: flex; align-items: baseline; gap: 6px; margin-bottom: 4px; }
        .cdj-note { color: #0af; font-size: 12px; }
        .cdj-track-name { color: #fff; font-size: 12px; font-weight: bold; flex: 1;
                          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cdj-format { color: #445; font-size: 8px; flex-shrink: 0; }

        /* Detail waveform */
        .cdj-detail-wrap { display: flex; gap: 4px; margin-bottom: 4px; }
        .cdj-detail { flex: 1; height: 100px; display: block; background: #060610;
                      border: 1px solid #1a2a3a; border-radius: 2px; }
        .cdj-zoom { display: flex; flex-direction: column; gap: 2px; }
        .cdj-zoom button { width: 22px; height: 22px; background: #1a1a2e; border: 1px solid #2a2a3e;
                           color: #0af; font-size: 14px; border-radius: 2px; cursor: pointer;
                           display: flex; align-items: center; justify-content: center; }
        .cdj-zoom button:hover { background: #2a2a3e; }
        .cdj-detail-fallback { margin-bottom: 4px; }

        /* Info bar (CDJ-2000 LCD style) */
        .cdj-info { display: flex; gap: 6px; align-items: flex-end; padding: 4px 0;
                    border-top: 1px solid #1a1a2e; border-bottom: 1px solid #1a1a2e; }
        .cdj-col { display: flex; flex-direction: column; align-items: center; }
        .cdj-grow { flex: 1; }
        .cdj-label { font-size: 7px; color: #334; text-transform: uppercase; letter-spacing: 0.5px;
                     margin-bottom: 1px; white-space: nowrap; }
        .cdj-player-box { font-size: 16px; font-weight: bold; color: #fff;
                          border: 1px solid #2a2a3e; border-radius: 3px; padding: 1px 6px;
                          font-family: 'Courier New', monospace; }
        .cdj-onair-active { color: #ff5722; }
        .cdj-onair-dim { color: #222; }
        .cdj-time { font-size: 20px; font-family: 'Courier New', monospace;
                    font-variant-numeric: tabular-nums; color: #0cf; cursor: pointer;
                    letter-spacing: -0.5px; }
        .cdj-pitch { font-size: 11px; font-family: 'Courier New', monospace; color: #0af;
                     font-variant-numeric: tabular-nums; }
        .cdj-bpm { font-size: 22px; font-weight: bold; font-family: 'Courier New', monospace;
                   color: #0cf; background: #0a1a2a; border: 1px solid #0af;
                   border-radius: 4px; padding: 1px 6px; font-variant-numeric: tabular-nums; }
        .cdj-key { color: #e1bee7; font-weight: bold; font-size: 10px; margin-top: 2px; }
        .cdj-sub { font-size: 8px; color: #556; margin-top: 1px; }
        .cdj-play-state { color: #4caf50; }
        .cdj-badge-master { color: #ffc107; background: #2a2000; padding: 0 3px; border-radius: 2px; }
        .cdj-badge-sync { font-size: 7px; color: #26c6da; background: #0a2a2a; padding: 1px 3px;
                          border-radius: 2px; vertical-align: middle; }
        .cdj-badge-mt { color: #82b1ff; background: #0a0a2a; padding: 0 3px; border-radius: 2px; }

        /* Beat dots */
        .cdj-beats { display: inline-flex; gap: 3px; align-items: center; }
        .beat-dot { width: 6px; height: 6px; border-radius: 50%; background: #222;
                    transition: background 0.08s, transform 0.08s; }
        .beat-dot.active { background: #ff5722; transform: scale(1.5); }
        .deck.on-air .beat-dot.active { background: #ff9800; }

        /* Bottom bar: overview + source */
        .cdj-bottom { display: flex; align-items: center; gap: 6px; margin-top: 4px;
                      min-width: 0; overflow: hidden; }
        .cdj-overview { flex: 1; height: 16px; display: block; background: #060610;
                        border-radius: 2px; border: 1px solid #1a1a2e; min-width: 0; }
        .cdj-overview-placeholder { flex: 1; height: 16px; min-width: 0; }
        .cdj-source { font-size: 8px; color: #334; flex-shrink: 0; white-space: nowrap; }

        /* Progress bar fallback (when no waveform) */
        .deck-progress {
            position: relative;
            height: 16px;
            background: #1a1a2e;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }
        .deck-progress-bar {
            height: 100%;
            background: #1a3a1a;
            transition: width 0.15s linear;
        }
        .deck.on-air .deck-progress-bar { background: #2a3a1a; }
        .deck-progress-time {
            position: absolute;
            top: 0;
            line-height: 16px;
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            padding: 0 4px;
        }
        .deck-progress-elapsed { left: 0; color: #ccc; }
        .deck-progress-remain { right: 0; color: #888; }
        .deck-position { color: #888; font-variant-numeric: tabular-nums; }
        .deck-media { color: #5a5; }
        .deck-db { color: #a5a; font-style: italic; }
        .deck-isrc { color: #888; font-family: monospace; font-size: 9px; }
        .conf-bar-container {
            position: relative;
            height: 14px;
            background: #1a1a2e;
            border-radius: 3px;
            margin: 6px 0 4px;
            overflow: hidden;
        }
        .conf-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.3s ease;
        }
        .conf-threshold {
            position: absolute;
            left: 60%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.25);
        }
        .conf-label {
            position: absolute;
            right: 4px;
            top: 0;
            line-height: 14px;
            font-size: 9px;
            color: #ccc;
            font-weight: bold;
        }
        .identification-panel {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .id-waiting { color: #555; text-align: center; font-size: 13px; }
        .id-track { text-align: center; margin-bottom: 8px; }
        .id-track.accepted .id-artist { color: #4caf50; }
        .id-artist { font-size: 18px; font-weight: bold; color: #00d4ff; }
        .id-title { font-size: 14px; color: #aaa; margin-top: 2px; }
        .no-decks {
            text-align: center;
            color: #666;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        /* Tracklist */
        .activity-section {
            background: #0a0a14;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .activity-section h2 { margin-bottom: 10px; color: #888; font-size: 12px; }
        .activity-log {
            max-height: 150px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 10px;
            line-height: 1.5;
            color: #6a6;
        }
        .log-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tracklist {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 15px;
        }
        .tracklist h2 { margin-bottom: 10px; color: #888; font-size: 12px; }
        .track {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 13px;
        }
        .track:last-child { border-bottom: none; }
        .track-time { color: #666; font-size: 11px; min-width: 45px; }
        .track-info { flex: 1; }
        .track-artist { font-weight: bold; }
        .track-title { color: #888; }
        .track-isrc { font-size: 9px; color: #555; font-family: monospace; margin-top: 2px; }
        
        /* Connection status */
        .status {
            position: fixed;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
        .status.connected { background: #1a4d1a; color: #4caf50; }
        .status.disconnected { background: #4d1a1a; color: #f44336; }
        
        /* Shazam status */
        /* Source badges */
        .source-badge {
            display: inline-block;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .source-badge.audio { background: #1a3d5c; color: #2196f3; }
        .source-badge.cdj { background: #3d1a5c; color: #9c27b0; }
        .source-badge.both { background: #1a4d1a; color: #4caf50; }
        .confidence { font-size: 10px; color: #888; }
        .track-meta { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        /* Mobile responsive */
        @media (max-width: 480px) {
            body { padding: 8px; }
            h1 { font-size: 1.3em; margin-bottom: 10px; }
            .audio-section { padding: 10px; gap: 15px; }
            .vu-bar-container { height: 100px; width: 20px; }
            .nerd-stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clubtagger</h1>
        
        <div class="decks-container" id="decks">
            <div class="no-decks">No CDJs detected</div>
        </div>

        <div class="sidebar">
            <div class="audio-section">
                <div class="vu-container">
                    <div class="vu-channel">
                        <div class="vu-bar-container">
                            <div class="vu-bar-bg"></div>
                            <div class="vu-bar-mask" id="vu-left"></div>
                            <div class="vu-peak" id="peak-left"></div>
                        </div>
                        <span class="vu-label">L</span>
                    </div>
                    <div class="vu-channel">
                        <div class="vu-bar-container">
                            <div class="vu-bar-bg"></div>
                            <div class="vu-bar-mask" id="vu-right"></div>
                            <div class="vu-peak" id="peak-right"></div>
                        </div>
                        <span class="vu-label">R</span>
                    </div>
                </div>
            </div>

            <div class="rec-panel">
                <div class="rec-indicator standby" id="rec-status">Standby</div>
                <div class="rec-detail"><span id="stat-format">—</span></div>
                <div class="rec-detail">Runtime: <span id="stat-runtime">0s</span></div>
                <div class="rec-detail">Written: <span id="stat-written">0</span></div>
                <div class="rec-detail">Lost: <span id="stat-lost">0</span></div>
            </div>

            <div class="identification-panel" id="identification">
                <div class="id-waiting">Waiting for track...</div>
            </div>

            <div class="nerd-stats">
                <div class="nerd-stats-header">
                    <span>📊 Stats</span>
                </div>
                <div class="nerd-stats-grid">
                    <div class="nerd-stat"><span class="label">Uptime</span><span class="value" id="stat-uptime">—</span></div>
                    <div class="nerd-stat"><span class="label">CDJs</span><span class="value" id="stat-cdjs">0</span></div>
                    <div class="nerd-stat"><span class="label">WS clients</span><span class="value" id="stat-ws">0</span></div>
                    <div class="nerd-stat"><span class="label">Tracks tagged</span><span class="value" id="stat-tagged">0</span></div>
                    <div class="nerd-stat"><span class="label">Pkt/s</span><span class="value" id="stat-pkts">0</span></div>
                    <div class="nerd-stat"><span class="label">Shazam</span><span class="value" id="stat-shazam">0/0</span></div>
                    <div class="nerd-stat"><span class="label">Ring buf</span><span class="value" id="stat-ring">—</span></div>
                    <div class="nerd-stat"><span class="label">Load</span><span class="value" id="stat-load">—</span></div>
                    <div class="nerd-stat"><span class="label">Mem</span><span class="value" id="stat-mem">—</span></div>
                    <div class="nerd-stat"><span class="label">Disk</span><span class="value" id="stat-disk">—</span></div>
                </div>
            </div>

            <div class="activity-section">
                <h2>ACTIVITY</h2>
                <div class="activity-log" id="activity-log"></div>
            </div>

            <div class="tracklist">
                <h2>RECENT TRACKS</h2>
                <div id="tracks"></div>
            </div>
        </div>
    </div>
    
    <div class="status disconnected" id="status">Disconnected</div>
    
    <script src="app.js"></script>
</body>
</html>
