<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clubtagger</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100vh;
            padding: 12px;
        }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { text-align: center; margin-bottom: 15px; color: #00d4ff; font-size: 1.5em; }

        /* Responsive layout: widescreen = decks left + sidebar right */
        @media (min-width: 1100px) {
            .container { display: grid; grid-template-columns: 1fr 600px; grid-template-rows: auto 1fr; gap: 12px; }
            .container > h1 { grid-column: 1 / -1; }
            .main-content { display: contents; }
            .decks-container { grid-column: 1; grid-row: 2; }
            .sidebar { grid-column: 2; grid-row: 2; display: flex; flex-direction: column; gap: 12px; }
        }
        @media (max-width: 1099px) {
            .sidebar { /* stacked below decks on narrow screens */ }
        }
        
        /* Audio section - compact VU + REC status */
        .audio-section {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 20px;
            margin-bottom: 20px;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 10px;
        }
        
        /* Channel meters (L/R per channel) */
        .ch-meters { display: flex; gap: 12px; }
        .ch-meter { display: flex; flex-direction: column; align-items: center; gap: 3px; }
        .ch-meter-bars { display: flex; gap: 2px; }
        .ch-meter-bar { width: 24px; height: 120px; background: #222; border-radius: 4px; position: relative; overflow: hidden; }
        .ch-meter-bg { position: absolute; bottom: 0; width: 100%; height: 100%; background: linear-gradient(to top, #444 0%, #444 60%, #666 75%, #888 85%, #aaa 95%); border-radius: 4px; }
        .ch-meter-bar.recording .ch-meter-bg { background: linear-gradient(to top, #ff4444 0%, #ff4444 60%, #ff8800 75%, #ffff00 85%, #ff0000 95%); }
        .ch-meter-mask { position: absolute; top: 0; width: 100%; background: #222; transition: height 50ms ease-out; }
        .ch-meter-name { font-size: 10px; color: #666; }
        .ch-meter.recording .ch-meter-name { color: #f44; }
        .audio-stats { font-size: 11px; color: #666; display: flex; flex-direction: column; gap: 4px; }
        .audio-stats span { color: #aaa; }
        @keyframes blink { 50% { opacity: 0.5; } }
        
        /* Nerd Stats Panel (collapsible) */
        .nerd-stats {
            background: #0f0f1a;
            border-radius: 8px;
            padding: 10px 15px;
            margin-bottom: 20px;
            font-family: 'SF Mono', Monaco, 'Courier New', monospace;
            font-size: 11px;
        }
        .nerd-stats-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
            color: #666;
            margin-bottom: 8px;
        }
        .nerd-stats-header:hover { color: #888; }
        .nerd-stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 8px;
        }
        .nerd-stat {
            display: flex;
            justify-content: space-between;
            padding: 4px 0;
            border-bottom: 1px solid #1a1a2e;
        }
        .nerd-stat .label { color: #666; }
        .nerd-stat .value { color: #00d4ff; }
        .nerd-stat .value.warn { color: #ff9800; }
        .nerd-stat .value.ok { color: #4caf50; }
        

        /* ═══════════ CDJ-2000 Style Deck Cards ═══════════ */
        @font-face {
            font-family: 'CDJ2000';
            src: url('CDJ2000-Regular.woff2') format('woff2');
            font-weight: normal; font-style: normal;
        }
        .decks-container {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(380px, 1fr));
            gap: 10px;
            margin-bottom: 20px;
            align-content: start;
        }
        @media (max-width: 480px) { .decks-container { grid-template-columns: 1fr; } }

        .deck.cdj-style {
            background: #0a0a12;
            border: 1px solid #1a1a2e;
            border-radius: 4px;
            padding: 8px;
            overflow: hidden;
            min-width: 0;
            aspect-ratio: 30 / 17;
            display: flex;
            flex-direction: column;
        }
        .deck.cdj-style.on-air { border-color: #3a1a1a; }

        /* Title */
        .cdj-title { display: flex; align-items: baseline; gap: 6px; margin-bottom: 6px; }
        .cdj-note { color: #0af; }
        .cdj-track-name { color: #fff; font-size: 13px; font-weight: bold; flex: 1;
                          white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .cdj-format { color: #445; font-size: 9px; }
        .cdj-key { color: #e1bee7; font-weight: bold; font-size: 12px; flex-shrink: 0; }

        /* Beat strip: ISRC left, beats centered, source right */
        .cdj-beat-strip { display: flex; align-items: center;
                          position: relative; padding: 4px 0; margin-bottom: 4px; }
        .cdj-beats { display: inline-flex; gap: 3px; align-items: center;
                     position: absolute; left: 50%; transform: translateX(-50%); }
        .beat-dot { width: 16px; height: 8px; border-radius: 1px; background: #1a1a2e; }
        .beat-dot.active { background: #ff5522; box-shadow: 0 0 4px #ff5522; }
        .cdj-source { font-size: 8px; color: #445; white-space: nowrap; margin-left: auto; }
        .cdj-isrc { font-size: 8px; color: #556; font-family: monospace; letter-spacing: 0.5px; }

        /* Detail waveform — zoom buttons overlaid top-right */
        .cdj-detail-wrap { position: relative; margin-bottom: 4px; flex: 1; min-height: 0; }
        .cdj-detail { width: 100%; height: 100%; display: block; background: transparent;
                      border-radius: 2px; min-width: 0; min-height: 0; }
        .cdj-zoom { position: absolute; right: 4px; top: 4px; display: flex; flex-direction: column; gap: 2px; z-index: 1; }
        .cdj-zoom button { width: 20px; height: 20px; background: rgba(10,10,30,0.7); border: 1px solid #2a2a3e;
                           color: #0af; font-size: 12px; border-radius: 2px; cursor: pointer; }
        .cdj-zoom button:hover { background: #2a2a3e; }
        .cdj-detail-fallback { margin-bottom: 4px; }

        /* ═══ Info bar ═══ */
        .cdj-info {
            position: relative; height: 55px;
            margin-top: 2px;
        }

        /* PLAYER box — CDJ-3000 style */
        .cdj-player-box {
            position: absolute; left: 0; top: 0; width: 50px; height: 46px;
            background: #0c0c18; border: 1px solid #2a2a3e; border-radius: 2px;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
        }
        .cdj-player-label { font-size: 7px; color: #889; text-transform: uppercase;
                            letter-spacing: 0.5px; font-weight: 600; line-height: 1; margin-bottom: 1px; }
        .cdj-player-num-row { display: flex; align-items: center; gap: 3px;
                              font-family: -apple-system, 'Helvetica Neue', sans-serif; }
        .cdj-player-num { font-size: 24px; font-weight: 700; color: #fff; line-height: 1; }
        /* On-air broadcast arcs — CDJ-3000 style */
        .cdj-onair { display: flex; flex-direction: row; gap: 2px; align-items: center; }
        .cdj-onair-arc { border: 1px solid transparent; box-sizing: border-box; border-radius: 50%; }
        .cdj-onair-arc-inner { width: 5px; height: 11px; }
        .cdj-onair-arc-outer { width: 7px; height: 15px; }
        .cdj-onair-on .cdj-onair-arc { border-color: #ff5722; }
        .cdj-onair-off .cdj-onair-arc { border-color: #333; }
        .cdj-onair-left .cdj-onair-arc { border-right-color: transparent; border-top-color: transparent; border-bottom-color: transparent; }
        .cdj-onair-right .cdj-onair-arc { border-left-color: transparent; border-top-color: transparent; border-bottom-color: transparent; }
        .cdj-master-badge { position: absolute; left: 0; top: 46px; font-size: 7px; }

        /* REMAIN label */
        .cdj-lbl-remain { position: absolute; left: 58px; top: 0px;
                          font-size: 7px; color: #556; text-transform: uppercase; letter-spacing: 0.5px; }

        /* LCD digits */
        .cdj-lcd { font-family: 'CDJ2000', monospace; color: #fff; font-size: 23px; line-height: 1; position: absolute; }
        .cdj-unit { font-family: -apple-system, sans-serif; color: #889; font-size: 9px; font-weight: 600;
                    position: absolute; }

        /* Time */
        .cdj-time { left: 58px; top: 10px; cursor: pointer; }
        .cdj-time-frac { font-size: 16px; }

        /* TEMPO label + badges */
        .cdj-tempo-badges { position: absolute; left: 220px; top: 0px; display: flex; gap: 3px;
                            align-items: center; }
        .cdj-badge { font-size: 7px; padding: 1px 3px; border-radius: 2px; display: inline-block; }
        .cdj-badge-master { color: #ffc107; background: #2a2000; }
        .cdj-badge-sync { color: #26c6da; background: #0a2a2a; }
        .cdj-badge-mt { color: #82b1ff; background: #0a0a2a; }

        /* Pitch — decimal point anchored at fixed position */
        .cdj-pitch-sign { left: 220px; top: 10px; }
        .cdj-pitch-int  { left: 239px; top: 10px; width: 36px; text-align: right; }
        .cdj-pitch-dot  { left: 275px; top: 10px; }
        .cdj-pitch-frac { left: 283px; top: 10px; }
        .cdj-pitch-pct  { left: 319px; top: 24px; font-size: 9px; color: #fff; }

        /* Play state */
        .cdj-play-state { position: absolute; left: 58px; top: 38px;
                          font-size: 8px; color: #4caf50; }

        /* BPM box */
        .cdj-bpm-box {
            position: absolute; right: 0; top: 0px; width: 80px; height: 43px;
            background: #0a0a12;
            border: 1px solid #f08138;
            border-radius: 3px;
            padding: 2px 4px; text-align: right;
            display: flex; flex-direction: column; justify-content: center;
        }
        .cdj-bpm-num { font-size: 23px; font-family: 'CDJ2000', monospace;
                       color: #f08138; line-height: 1; white-space: nowrap; }
        .cdj-bpm-dec { font-size: 16px; }
        .cdj-bpm-label { font-size: 7px; color: #f08138; text-transform: uppercase;
                         letter-spacing: 1px; margin-top: 2px; text-align: right; }

        /* Bottom: overview + position bar */
        .cdj-bottom { margin-top: 0; }
        .cdj-overview-stack { position: relative; }
        .cdj-overview { width: 100%; height: 16px; background: transparent; display: block; }
        .cdj-overview-placeholder { height: 16px; }

        /* Playhead */
        .cdj-playhead { position: absolute; left: 0%; top: -9px; bottom: 4px;
                        width: 2px; z-index: 2; pointer-events: none;
                        background: #fff;
                        border-top: 1px solid #0e0e0e;
                        border-bottom: 1px solid #0e0e0e; }
        .cdj-playhead::after { content: ''; position: absolute; left: -1px; right: -1px;
                               bottom: -3px; height: 10px;
                               border-left: 1px solid #0e0e0e;
                               border-right: 1px solid #0e0e0e; }

        /* Position bar */
        .cdj-posbar { position: relative; height: 11px; margin-top: 2px; }
        .cdj-posbar-played { position: absolute; left: 0; top: 0; width: 0%; height: 4px; box-sizing: border-box;
                             border-left: 1px solid #64656d;
                             background:
                               repeating-linear-gradient(90deg, #44454a 0px, #44454a 1px, #64656d 1px, #64656d 2px),
                               repeating-linear-gradient(90deg, #44454a 0px, #44454a 1px, #64656d 1px, #64656d 2px);
                             background-size: 100% 1px;
                             background-position: 0 0, 0 100%;
                             background-repeat: repeat-x; }
        .cdj-posbar-remain { position: absolute; left: 0%; top: 0; right: 0; height: 4px;
                             background: repeating-linear-gradient(90deg,
                               #fff 0px, #fff 1px, #c4c5c6 1px, #c4c5c6 2px); }
        .cdj-posbar-ticks { position: absolute; left: 0; right: 0; top: 7px; height: 4px; }
        .cdj-posbar-tick { position: absolute; top: 0; width: 1px; height: 4px; background: #fff; }

        .cdj-source-bottom { font-size: 8px; color: #445; white-space: nowrap; margin-left: auto; }

        /* Progress bar fallback (when no waveform) */
        .deck-progress {
            position: relative;
            height: 16px;
            background: #1a1a2e;
            border-radius: 3px;
            margin-top: 6px;
            overflow: hidden;
        }
        .deck-progress-bar {
            height: 100%;
            background: #1a3a1a;
            transition: width 0.15s linear;
        }
        .deck.on-air .deck-progress-bar { background: #2a3a1a; }
        .deck-progress-time {
            position: absolute;
            top: 0;
            line-height: 16px;
            font-size: 10px;
            font-variant-numeric: tabular-nums;
            padding: 0 4px;
        }
        .deck-progress-elapsed { left: 0; color: #ccc; }
        .deck-progress-remain { right: 0; color: #888; }
        .deck-position { color: #888; font-variant-numeric: tabular-nums; }
        .deck-media { color: #5a5; }
        .deck-db { color: #a5a; font-style: italic; }
        .deck-isrc { color: #888; font-family: monospace; font-size: 9px; }
        .conf-bar-container {
            position: relative;
            height: 14px;
            background: #1a1a2e;
            border-radius: 3px;
            margin: 6px 0 4px;
            overflow: hidden;
        }
        .conf-bar {
            height: 100%;
            border-radius: 3px;
            transition: width 0.5s ease, background 0.3s ease;
        }
        .conf-threshold {
            position: absolute;
            left: 60%;
            top: 0;
            bottom: 0;
            width: 1px;
            background: rgba(255,255,255,0.25);
        }
        .conf-label {
            position: absolute;
            right: 4px;
            top: 0;
            line-height: 14px;
            font-size: 9px;
            color: #ccc;
            font-weight: bold;
        }
        .identification-panel {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .id-waiting { color: #555; text-align: center; font-size: 13px; }
        .id-track { text-align: center; margin-bottom: 8px; }
        .id-track.accepted .id-artist { color: #4caf50; }
        .id-artist { font-size: 18px; font-weight: bold; color: #00d4ff; }
        .id-title { font-size: 14px; color: #aaa; margin-top: 2px; }
        .no-decks {
            text-align: center;
            color: #666;
            padding: 15px;
            background: #0f0f1a;
            border-radius: 8px;
            margin-bottom: 20px;
            font-size: 12px;
        }
        
        /* Tracklist */
        .activity-section {
            background: #0a0a14;
            border-radius: 10px;
            padding: 15px;
            margin-bottom: 20px;
        }
        .activity-section h2 { margin-bottom: 10px; color: #888; font-size: 12px; }
        .activity-log {
            max-height: 150px;
            overflow-y: auto;
            font-family: 'SF Mono', 'Menlo', 'Monaco', monospace;
            font-size: 10px;
            line-height: 1.5;
            color: #6a6;
        }
        .log-line { white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .tracklist {
            background: #0f0f1a;
            border-radius: 10px;
            padding: 15px;
        }
        .tracklist h2 { margin-bottom: 10px; color: #888; font-size: 12px; }
        .track {
            padding: 8px 0;
            border-bottom: 1px solid #222;
            display: flex;
            gap: 10px;
            align-items: flex-start;
            font-size: 13px;
        }
        .track:last-child { border-bottom: none; }
        .track-time { color: #666; font-size: 11px; min-width: 45px; }
        .track-info { flex: 1; }
        .track-artist { font-weight: bold; }
        .track-title { color: #888; }
        .track-isrc { font-size: 9px; color: #555; font-family: monospace; margin-top: 2px; }
        
        /* Connection status */
        .status {
            position: fixed;
            top: 8px;
            right: 8px;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 10px;
        }
        .status.connected { background: #1a4d1a; color: #4caf50; }
        .status.disconnected { background: #4d1a1a; color: #f44336; }
        
        /* Shazam status */
        /* Source badges */
        .source-badge {
            display: inline-block;
            font-size: 9px;
            padding: 2px 5px;
            border-radius: 3px;
            text-transform: uppercase;
            margin-right: 4px;
        }
        .source-badge.audio { background: #1a3d5c; color: #2196f3; }
        .source-badge.cdj { background: #3d1a5c; color: #9c27b0; }
        .source-badge.both { background: #1a4d1a; color: #4caf50; }
        .confidence { font-size: 10px; color: #888; }
        .track-meta { display: flex; align-items: center; gap: 4px; margin-top: 2px; }
        /* Mobile responsive */
        @media (max-width: 480px) {
            body { padding: 8px; }
            h1 { font-size: 1.3em; margin-bottom: 10px; }
            .audio-section { padding: 10px; gap: 15px; }
            .ch-meter-bar { height: 100px; width: 20px; }
            .nerd-stats-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Clubtagger</h1>
        
        <div class="decks-container" id="decks">
            <div class="no-decks">No CDJs detected</div>
        </div>

        <div class="sidebar">
            <div class="audio-section">
                <div class="ch-meters" id="ch-meters"></div>
                <div class="audio-stats">
                    <div><span id="stat-format">—</span></div>
                    <div>Lost: <span id="stat-lost">0</span></div>
                </div>
            </div>

            <div class="identification-panel" id="identification">
                <div class="id-waiting">Waiting for track...</div>
            </div>

            <div class="nerd-stats">
                <div class="nerd-stats-header">
                    <span>📊 Stats</span>
                </div>
                <div class="nerd-stats-grid">
                    <div class="nerd-stat"><span class="label">Uptime</span><span class="value" id="stat-uptime">—</span></div>
                    <div class="nerd-stat"><span class="label">CDJs</span><span class="value" id="stat-cdjs">0</span></div>
                    <div class="nerd-stat"><span class="label">WS clients</span><span class="value" id="stat-ws">0</span></div>
                    <div class="nerd-stat"><span class="label">Tracks tagged</span><span class="value" id="stat-tagged">0</span></div>
                    <div class="nerd-stat"><span class="label">Pkt/s</span><span class="value" id="stat-pkts">0</span></div>
                    <div class="nerd-stat"><span class="label">Shazam</span><span class="value" id="stat-shazam">0/0</span></div>
                    <div class="nerd-stat"><span class="label">Ring buf</span><span class="value" id="stat-ring">—</span></div>
                    <div class="nerd-stat"><span class="label">Load</span><span class="value" id="stat-load">—</span></div>
                    <div class="nerd-stat"><span class="label">Mem</span><span class="value" id="stat-mem">—</span></div>
                    <div class="nerd-stat"><span class="label">Disk</span><span class="value" id="stat-disk">—</span></div>
                </div>
            </div>

            <div class="activity-section">
                <h2>ACTIVITY</h2>
                <div class="activity-log" id="activity-log"></div>
            </div>

            <div class="tracklist">
                <h2>RECENT TRACKS</h2>
                <div id="tracks"></div>
            </div>
        </div>
    </div>
    
    <div class="status disconnected" id="status">Disconnected</div>
    
    <script src="app.js"></script>
</body>
</html>
